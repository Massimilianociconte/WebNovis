name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate
        run: npm run ci:quality:dist

      - name: Verify build did not mutate tracked sources
        run: git diff --exit-code

      - name: Upload sanitized public artifact
        uses: actions/upload-artifact@v4
        with:
          name: webnovis-public-dist
          path: dist/
          include-hidden-files: true
          if-no-files-found: error

      - name: Verify production headers
        if: github.event_name == 'workflow_dispatch'
        run: npm run verify:prod-headers
